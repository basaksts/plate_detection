[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v
markers =
    unit: Donanımdan bağımsız unit testler
    smoke: Temel sistem smoke testleri
    backend: Flask/API/SQLite testleri
    ocr: OCR ve görüntü işleme testleri
    e2e: Uçtan uca senaryolar
    performance: Performans ve süre ölçüm testleri
    security: Güvenlik testleri
    requires_real_images: Gerçek saha görüntüsü gerektiren testler
    requires_hardware: Kamera/ESP32/Raspberry Pi gibi donanım gerektiren testler

