<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Plaka Tanıma Sistemi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚗 Akıllı Otopark Sistemi</h1>

    <div class="row">

        <div class="card camera">
            <h2>📷 Canlı Kamera</h2>
            <img src="{{ url_for('video_feed') }}">
        </div>

        <div class="card detection">
            <h2>🔍 Tespit</h2>
            <p class="plate">{{ plate }}</p>
            <p class="status {{ status_class }}">{{ status }}</p>
        </div>

    </div>

</div>

</body>
</html>
